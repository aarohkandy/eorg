<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8c6757">
  <title>Mailita</title>
  <style>
    :root {
      --bg-top: #8c6757;
      --bg-bottom: #b88f77;
      --bg-glow: rgba(244, 224, 206, 0.16);
      --chrome: #312325;
      --chrome-soft: rgba(49, 35, 37, 0.72);
      --bubble-incoming: #f3e7dd;
      --bubble-outgoing: #e7c6b6;
      --text-strong: #2f211d;
      --text-on-dark: #fff7f0;
      --text-muted: #8d7367;
      --cta-accent: #f0d3c0;
      --cta-text: #3a2722;
      --shadow-soft: rgba(34, 22, 19, 0.10);
      --shadow-strong: rgba(28, 18, 16, 0.18);
      --header-height-mobile: 52px;
      --header-height-desktop: 56px;
      --lane-width: min(calc(100% - 2 * clamp(16px, 4vw, 32px)), 520px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100svh;
      height: 100svh;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text-strong);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      position: relative;
    }

    .background {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .background::before {
      content: "";
      position: absolute;
      inset: -18% -10% auto;
      height: 56%;
      background: radial-gradient(
        ellipse at top center,
        rgba(255, 244, 234, 0.5) 0%,
        rgba(255, 233, 214, 0.22) 34%,
        rgba(255, 233, 214, 0) 74%
      );
      opacity: 0.9;
      transform: translate3d(0, 0, 0);
      animation: washDrift 22s ease-in-out infinite;
    }

    .background::after {
      content: "";
      position: absolute;
      right: -12%;
      bottom: 4%;
      width: min(60vw, 560px);
      aspect-ratio: 1;
      border-radius: 999px;
      background: radial-gradient(
        circle,
        rgba(76, 48, 41, 0.18) 0%,
        rgba(76, 48, 41, 0.12) 26%,
        rgba(76, 48, 41, 0) 72%
      );
      opacity: 0.9;
      transform: translate3d(0, 0, 0);
      animation: massDrift 26s ease-in-out infinite;
    }

    .messages-screen {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100svh;
      height: 100svh;
      overflow: hidden;
    }

    .thread-header {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      left: 0;
      width: 100%;
      height: var(--header-height-mobile);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      z-index: 2;
      pointer-events: none;
    }

    .thread-header::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(calc(100vw - 32px), 560px);
      height: 100%;
      border-radius: 18px;
      background: linear-gradient(
        180deg,
        rgba(49, 35, 37, 0.84),
        rgba(49, 35, 37, 0.64)
      );
      box-shadow: 0 12px 28px var(--shadow-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transform: translate(-50%, -50%);
    }

    .thread-title {
      position: relative;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-on-dark);
    }

    .thread-stage {
      width: 100%;
      min-height: 100%;
      height: 100%;
      padding-top: calc(
        max(10px, env(safe-area-inset-top)) + var(--header-height-mobile) + 12px
      );
      padding-bottom: max(24px, calc(env(safe-area-inset-bottom) + 16px));
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .thread-scroll {
      width: var(--lane-width);
      max-width: var(--lane-width);
      height: 100%;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: none;
      padding: 0 clamp(18px, 4vw, 32px);
    }

    .thread-scroll::-webkit-scrollbar {
      display: none;
    }

    .message-list {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 0;
      padding-bottom: max(20px, calc(env(safe-area-inset-bottom) + 20px));
    }

    .message-row {
      display: flex;
      width: 100%;
      margin-top: 10px;
    }

    .message-row.you {
      justify-content: flex-end;
      padding-left: clamp(52px, 9vw, 68px);
      padding-right: clamp(12px, 2.4vw, 18px);
    }

    .message-row.mailita {
      justify-content: flex-start;
      padding-right: clamp(52px, 9vw, 68px);
    }

    .message-row.same-speaker {
      margin-top: 3px;
    }

    .bubble {
      position: relative;
      max-width: min(100%, 360px);
      padding: 11px 16px;
      border-radius: 20px;
      box-shadow: 0 10px 24px var(--shadow-soft);
      line-height: 1.3;
      font-size: 1rem;
      letter-spacing: -0.015em;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .bubble.mailita {
      background: var(--bubble-incoming);
      color: var(--text-strong);
    }

    .bubble.you {
      background: var(--bubble-outgoing);
      color: var(--text-strong);
      margin-right: 4px;
    }

    .bubble.single.mailita {
      border-radius: 20px 20px 20px 8px;
    }

    .bubble.start.mailita {
      border-radius: 20px 20px 20px 6px;
    }

    .bubble.middle.mailita {
      border-radius: 6px 20px 20px 6px;
    }

    .bubble.end.mailita {
      border-radius: 6px 20px 20px 8px;
    }

    .bubble.single.you {
      border-radius: 20px 20px 8px 20px;
    }

    .bubble.start.you {
      border-radius: 20px 20px 6px 20px;
    }

    .bubble.middle.you {
      border-radius: 20px 6px 6px 20px;
    }

    .bubble.end.you {
      border-radius: 20px 6px 8px 20px;
    }

    .bubble-tail {
      position: absolute;
      bottom: 1px;
      width: 14px;
      height: 14px;
      z-index: -1;
      pointer-events: none;
    }

    .bubble.mailita .bubble-tail {
      left: -3px;
      border-bottom-left-radius: 12px;
      background: var(--bubble-incoming);
      transform: rotate(26deg);
      transform-origin: right bottom;
    }

    .bubble.you .bubble-tail {
      right: -3px;
      border-bottom-right-radius: 12px;
      background: var(--bubble-outgoing);
      transform: rotate(-26deg);
      transform-origin: left bottom;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 68px;
      padding: 10px 14px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(47, 33, 29, 0.34);
      animation: typingBounce 1.06s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.12s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.24s;
    }

    .cta-wrap {
      max-width: min(100%, 388px);
      padding: 8px;
      background: var(--bubble-incoming);
    }

    .cta-button {
      display: block;
      width: 100%;
      min-height: 44px;
      padding: 12px 18px;
      border: 0;
      border-radius: 16px;
      background: var(--cta-accent);
      color: var(--cta-text);
      text-decoration: none;
      text-align: center;
      font-size: 0.99rem;
      font-weight: 700;
      line-height: 1.2;
      box-shadow: 0 8px 18px var(--shadow-soft);
      transition:
        transform 180ms ease,
        background-color 180ms ease,
        box-shadow 180ms ease;
    }

    .cta-button:hover,
    .cta-button:focus-visible {
      background: #e4c0ad;
      box-shadow: 0 10px 22px var(--shadow-strong);
      transform: translateY(-1px);
      outline: none;
    }

    @keyframes washDrift {
      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.88;
      }

      50% {
        transform: translate3d(2.5%, 4%, 0) scale(1.04);
        opacity: 1;
      }
    }

    @keyframes massDrift {
      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.82;
      }

      50% {
        transform: translate3d(-4%, -3%, 0) scale(1.05);
        opacity: 0.92;
      }
    }

    @keyframes typingBounce {
      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.38;
      }

      40% {
        transform: translateY(-3px);
        opacity: 1;
      }
    }

    @media (min-width: 700px) {
      .thread-header {
        height: var(--header-height-desktop);
      }

      .thread-stage {
        padding-top: calc(
          max(10px, env(safe-area-inset-top)) + var(--header-height-desktop) + 16px
        );
      }
    }

    @media (max-width: 699px) {
      .thread-scroll {
        width: 100%;
        max-width: 100%;
        padding: 0 16px;
      }

      .bubble {
        max-width: min(100%, 360px);
        padding: 10px 14px;
        font-size: 0.97rem;
      }

      .bubble.you {
        margin-right: 44px;
      }

      .cta-wrap {
        max-width: min(100%, 388px);
      }

      .message-row.mailita {
        padding-right: 44px;
      }

      .message-row.you {
        padding-left: 44px;
        padding-right: 34px;
      }
    }

    @media (max-height: 640px) {
      .thread-header {
        top: max(6px, env(safe-area-inset-top));
        height: 48px;
      }

      .thread-stage {
        padding-top: calc(
          max(6px, env(safe-area-inset-top)) + 48px + 8px
        );
        padding-bottom: max(18px, calc(env(safe-area-inset-bottom) + 10px));
      }

      .thread-scroll {
        padding: 0 12px;
      }

      .message-list {
        padding-bottom: max(16px, calc(env(safe-area-inset-bottom) + 10px));
      }

      .message-row {
        margin-top: 8px;
      }

      .message-row.same-speaker {
        margin-top: 2px;
      }

      .message-row.mailita {
        padding-right: 38px;
      }

      .message-row.you {
        padding-left: 38px;
        padding-right: 28px;
      }

      .bubble {
        padding: 9px 13px;
        font-size: 0.95rem;
      }

      .bubble.you {
        margin-right: 38px;
      }
    }

    @media (max-width: 360px) {
      .thread-scroll {
        padding: 0 12px;
      }

      .message-row.mailita {
        padding-right: 30px;
      }

      .message-row.you {
        padding-left: 28px;
        padding-right: 18px;
      }

      .bubble {
        font-size: 0.94rem;
      }

      .bubble.you {
        max-width: calc(100% - 72px);
        margin-right: 72px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .background::before,
      .background::after,
      .typing-dot {
        animation: none;
      }

      .cta-button {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="background" aria-hidden="true"></div>

  <main class="messages-screen">
    <header class="thread-header">
      <div class="thread-title">Mailita</div>
    </header>

    <section class="thread-stage" aria-label="Mailita conversation">
      <div class="thread-scroll" id="thread-scroll">
        <div class="message-list" id="message-list"></div>
      </div>
    </section>
  </main>

  <script>
    const conversation = [
      { speaker: "mailita", text: "hey \u{1F44B}" },
      { speaker: "mailita", text: "i'm mailita" },
      {
        speaker: "mailita",
        text: "every person becomes a chat. your boss, stripe, notion."
      },
      { speaker: "you", text: "so email feels like iMessage?" },
      {
        speaker: "mailita",
        text: "exactly. react fast, mute noise, reply when it matters."
      },
      { speaker: "you", text: "ok i need this" },
      {
        speaker: "mailita",
        cta: true,
        buttonText: "Add Mailita to Chrome",
        href: "#"
      }
    ];

    const timings = {
      initialPause: 620,
      typing: 400,
      sameSpeakerGap: 96,
      speakerChangeGap: 236,
      incomingBubble: 340,
      outgoingBubble: 320,
      ctaEntrance: 390
    };

    const timingVariance = {
      initialPause: 70,
      typing: 86,
      sameSpeakerGap: 34,
      speakerChangeGap: 56,
      incomingBubble: 34,
      outgoingBubble: 28,
      ctaEntrance: 38
    };

    const messageList = document.getElementById("message-list");
    const threadScroll = document.getElementById("thread-scroll");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const typingTurns = new Set([0, 4, 6]);

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function withVariance(base, spread) {
      if (reduceMotion || !spread) {
        return base;
      }

      const offset = (Math.random() * 2 - 1) * spread;
      return Math.max(0, Math.round(base + offset));
    }

    function getGroupPosition(index) {
      const current = conversation[index];
      const previous = conversation[index - 1];
      const next = conversation[index + 1];
      const samePrevious = previous && previous.speaker === current.speaker;
      const sameNext = next && next.speaker === current.speaker;

      if (!samePrevious && !sameNext) {
        return "single";
      }

      if (!samePrevious && sameNext) {
        return "start";
      }

      if (samePrevious && sameNext) {
        return "middle";
      }

      return "end";
    }

    function createTail() {
      const tail = document.createElement("span");
      tail.className = "bubble-tail";
      tail.setAttribute("aria-hidden", "true");
      return tail;
    }

    function createBubble(item, groupPosition) {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${item.speaker} ${groupPosition}`;

      if (item.cta) {
        bubble.classList.add("cta-wrap");
        const button = document.createElement("a");
        button.className = "cta-button";
        button.href = item.href;
        button.textContent = item.buttonText;
        bubble.appendChild(button);
      } else {
        bubble.textContent = item.text;
      }

      if (groupPosition === "single" || groupPosition === "end") {
        bubble.appendChild(createTail());
      }

      return bubble;
    }

    function createMessageRow(item, index) {
      const previous = conversation[index - 1];
      const row = document.createElement("div");
      const sameSpeaker = previous && previous.speaker === item.speaker;
      row.className = `message-row ${item.speaker}${sameSpeaker ? " same-speaker" : ""}`;
      row.appendChild(createBubble(item, getGroupPosition(index)));
      return row;
    }

    function createTypingRow(index) {
      const previous = conversation[index - 1];
      const sameSpeaker = previous && previous.speaker === "mailita";
      const row = document.createElement("div");
      row.className = `message-row mailita${sameSpeaker ? " same-speaker" : ""}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble mailita typing ${getGroupPosition(index)}`;

      for (let i = 0; i < 3; i += 1) {
        const dot = document.createElement("span");
        dot.className = "typing-dot";
        dot.setAttribute("aria-hidden", "true");
        bubble.appendChild(dot);
      }

      if (getGroupPosition(index) === "single" || getGroupPosition(index) === "end") {
        bubble.appendChild(createTail());
      }

      row.appendChild(bubble);
      return row;
    }

    function syncScroll() {
      threadScroll.scrollTop = threadScroll.scrollHeight;
    }

    function animateRow(row, duration, speaker, kind = "message") {
      if (reduceMotion) {
        return Promise.resolve();
      }

      const bubble = row.firstElementChild;
      const isTyping = kind === "typing";
      const isOutgoing = speaker === "you";
      const startOpacity = isTyping ? 0.56 : 0.82;
      const startX = isTyping ? -6 : isOutgoing ? 16 : -7;
      const startY = isTyping ? 8 : isOutgoing ? 6 : 10;
      const overshootX = isTyping ? 0.8 : isOutgoing ? -1.2 : 1.2;
      const startScale = isTyping ? 0.96 : isOutgoing ? 0.965 : 0.94;
      const easing = isTyping
        ? "cubic-bezier(0.2, 0.86, 0.2, 1)"
        : isOutgoing
          ? "cubic-bezier(0.24, 0.9, 0.22, 1)"
          : "cubic-bezier(0.18, 1, 0.28, 1)";

      bubble.style.opacity = "0";
      bubble.style.transformOrigin = isOutgoing ? "100% 100%" : "0% 100%";
      bubble.style.willChange = "transform, opacity";

      bubble.animate(
        [
          {
            opacity: startOpacity,
            transform: `translate3d(${startX}px, ${startY}px, 0) scale(${startScale})`
          },
          {
            opacity: 1,
            transform: `translate3d(${overshootX}px, -1px, 0) scale(1.01)`,
            offset: isTyping ? 0.76 : 0.68
          },
          {
            opacity: 1,
            transform: "translate3d(0, 0, 0) scale(1)"
          }
        ],
        {
          duration,
          easing,
          fill: "forwards"
        }
      );

      return wait(duration).then(() => {
        bubble.style.opacity = "1";
        bubble.style.transform = "translate3d(0, 0, 0) scale(1)";
        bubble.style.willChange = "auto";
      });
    }

    async function appendTyping(index) {
      const row = createTypingRow(index);
      messageList.appendChild(row);
      syncScroll();

      const introDuration = withVariance(210, 24);
      await animateRow(row, introDuration, "mailita", "typing");
      await wait(withVariance(timings.typing, timingVariance.typing));

      if (!reduceMotion) {
        const bubble = row.firstElementChild;
        bubble.style.willChange = "transform, opacity";
        bubble.animate(
          [
            {
              opacity: 1,
              transform: "translate3d(0, 0, 0) scale(1)"
            },
            {
              opacity: 0,
              transform: "translate3d(-4px, 5px, 0) scale(0.985)"
            }
          ],
          {
            duration: 140,
            easing: "cubic-bezier(0.4, 0, 1, 1)",
            fill: "forwards"
          }
        );
        await wait(120);
      }

      row.remove();
    }

    async function appendMessage(item, index) {
      const row = createMessageRow(item, index);
      const previous = conversation[index - 1];
      const sameSpeaker = previous && previous.speaker === item.speaker;
      messageList.appendChild(row);
      syncScroll();

      const baseDuration = item.cta
        ? timings.ctaEntrance
        : item.speaker === "you"
          ? sameSpeaker
            ? 210
            : timings.outgoingBubble
          : sameSpeaker
            ? 178
            : timings.incomingBubble;

      const variance = item.cta
        ? timingVariance.ctaEntrance
        : item.speaker === "you"
          ? sameSpeaker
            ? 18
            : timingVariance.outgoingBubble
          : sameSpeaker
            ? 16
            : timingVariance.incomingBubble;

      const duration = withVariance(baseDuration, variance);

      await animateRow(row, duration, item.speaker, item.cta ? "cta" : "message");
      syncScroll();
    }

    async function playConversation() {
      await wait(withVariance(timings.initialPause, timingVariance.initialPause));

      for (let index = 0; index < conversation.length; index += 1) {
        const item = conversation[index];
        const previous = conversation[index - 1];

        if (index > 0) {
          const gap = previous.speaker === item.speaker
            ? withVariance(timings.sameSpeakerGap, timingVariance.sameSpeakerGap)
            : withVariance(timings.speakerChangeGap, timingVariance.speakerChangeGap);
          await wait(gap);
        }

        if (item.speaker === "mailita" && typingTurns.has(index)) {
          await appendTyping(index);
          await wait(withVariance(26, 12));
        }

        await appendMessage(item, index);
      }
    }

    window.addEventListener("load", () => {
      playConversation();
    }, { once: true });
  </script>
</body>
</html>
